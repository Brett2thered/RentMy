name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.labels.*.name, ','), '') ||
      true

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: rentmy
          POSTGRES_PASSWORD: rentmy
          POSTGRES_DB: rentmy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rentmy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o bin/server ./cmd/server

      - name: Test
        run: go test ./... -v -count=1 -timeout=60s
        env:
          DATABASE_URL: postgres://rentmy:rentmy@localhost:5432/rentmy?sslmode=disable
          REDIS_URL: redis://localhost:6379

  mobile:
    name: Mobile
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx expo lint 2>/dev/null || echo "Lint config not yet set up — skipping"
